  <body class="pages">
    <a class="goBack" href="index.html">вернуться на главную</a>
    <div class="text">
      <p>тренировка</p>
    </div>
    <div class="overlay">
      <div class="popup">
        <p>введите количество слов для тренировки</p>
        <input type="number" id="num" />
        <button onclick="startTraining()">начать</button>
      </div>
    </div>
    <div class="trainCard">
      <div class="okoshko">
        <div class="pole">
          <p>слово</p>
          <input id="trainWord" />
        </div>
        <div class="pole">
          <p>перевод</p>
          <input id="trainTranslation" />
        </div>
      </div>
      <button onclick="check()">проверка</button>
    </div>
  </body>
  <script>
    let words = [];
    let currentIndex = 0;
    let count = 0;
    let maxCount = 0;

    async function startTraining() {
      document.querySelector(".overlay").style.display = "none";
      document.querySelector(".trainCard").style.display = "flex";

      maxCount = parseInt(document.getElementById("num").value);

      const res = await fetch(
        "https://vocabulary-production-80ee.up.railway.app/words",
      );
      words = await res.json();

      showNextWord();
    }

    function showNextWord() {
      if (count >= maxCount) {
        alert("Тренировка завершена!");
        return;
      }
      const index = Math.floor(Math.random() * words.length);
      currentWord = words[index];
      const normalize = (str) =>
        str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
      document.getElementById("trainWord").value = normalize(currentWord.word);
      document.getElementById("trainTranslation").value = "";
    }

    function check() {
      const translatee = document
        .getElementById("trainTranslation")
        .value.trim();
      if (translate === "") return;

      const normalize = (str) =>
        str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();

      const translate = normalize(translatee);
      const correctAnswer = normalize(currentWord.translation);
      if (translate === correctAnswer) {
        count++;
        showNextWord();
      } else {
        alert("Неверно, попробуй ещё раз!");
      }
    }
